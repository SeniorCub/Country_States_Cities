name: Deploy Laravel API

on:
  push:
    branches:
      - main
    paths:
      - 'Laravel/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via FTP to Go54 cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Laravel/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            storage/*.key
            .env
            .env.production

      - name: Write .env file on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cat > ~/public_html/country-states-cities.seniorcub.name.ng/laravel/.env << 'INNER_EOF'
            ${{ secrets.LARAVEL_ENV_FILE }}
            INNER_EOF
            chmod 600 ~/public_html/country-states-cities.seniorcub.name.ng/laravel/.env

      - name: Path Configuration & Validation
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            BASE_DIR=~/public_html/country-states-cities.seniorcub.name.ng
            APP_DIR="$BASE_DIR/laravel"
            WEB_DIR="$BASE_DIR/api"
            
            mkdir -p "$APP_DIR" "$WEB_DIR"
            
            if [ ! -f "$APP_DIR/artisan" ]; then
              echo "[ERROR] artisan not found at $APP_DIR/artisan"
              exit 1
            fi

      - name: Application Permissions
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            APP_DIR=~/public_html/country-states-cities.seniorcub.name.ng/laravel
            echo "[INFO] Setting permissions..."
            chmod -R 755 "$APP_DIR"
            chmod -R 775 "$APP_DIR/storage" "$APP_DIR/bootstrap/cache"

      - name: Laravel Build & Cache
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            APP_DIR=~/public_html/country-states-cities.seniorcub.name.ng/laravel
            cd "$APP_DIR"
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:clear
            php artisan view:cache

      - name: Web Subdomain Setup
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            APP_DIR=~/public_html/country-states-cities.seniorcub.name.ng/laravel
            WEB_DIR=~/public_html/country-states-cities.seniorcub.name.ng/api
            
            # 1. Setup api index.php (Laravel Entrypoint)
            printf '<?php\n\nuse Illuminate\\Contracts\\Http\\Kernel;\nuse Illuminate\\Http\\Request;\n\ndefine('\''LARAVEL_START'\'', microtime(true));\n\nif (file_exists($maintenance = __DIR__."/../laravel/storage/framework/maintenance.php")) {\n    require $maintenance;\n}\n\nrequire __DIR__."/../laravel/vendor/autoload.php";\n\n$app = require_once __DIR__."/../laravel/bootstrap/app.php";\n\n$kernel = $app->make(Kernel::class);\n\n$response = $kernel->handle(\n    $request = Request::capture()\n)->send();\n\n$kernel->terminate($request, $response);' > "$WEB_DIR/index.php"

            # 2. Setup .htaccess for api
            if [ -f "$APP_DIR/public/.htaccess" ]; then
              cp -f "$APP_DIR/public/.htaccess" "$WEB_DIR/.htaccess"
            fi

      - name: Storage Symlinks
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            APP_DIR=~/public_html/country-states-cities.seniorcub.name.ng/laravel
            WEB_DIR=~/public_html/country-states-cities.seniorcub.name.ng/api
            
            # Create symlink if it doesn't exist
            [ -L "$WEB_DIR/storage" ] || ln -s "$APP_DIR/storage/app/public" "$WEB_DIR/storage"
            
            echo "[OK] Storage links verified"
