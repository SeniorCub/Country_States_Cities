name: Deploy Laravel API

on:
  push:
    branches:
      - main
    paths:
      - 'Laravel/**'
      - '.github/workflows/deploy-laravel.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via FTP to Go54 cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Laravel/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            storage/*.key
            .env
            .env.production

      - name: Server Configuration and Laravel Setup
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            
            # Use absolute path based on your server logs
            BASE_DIR="/home2/seniorcu/public_html/country-states-cities.seniorcub.name.ng"
            APP_DIR="$BASE_DIR/laravel"
            
            echo "[INFO] Detecting Application Root..."
            
            # Auto-discovery if artisan is not in the expected folder
            if [ ! -f "$APP_DIR/artisan" ]; then
              if [ -f "$BASE_DIR/artisan" ]; then
                echo "[INFO] Found artisan in BASE_DIR. Adjusting APP_DIR..."
                APP_DIR="$BASE_DIR"
              else
                echo "[ERROR] Could not find 'artisan' in $APP_DIR or $BASE_DIR."
                echo "[DEBUG] Current directory: $(pwd)"
                echo "[DEBUG] Contents of BASE_DIR:"
                ls -F "$BASE_DIR"
                exit 1
              fi
            fi
            
            echo "[INFO] Target App Directory: $APP_DIR"
            
            # 1. Set permissions
            chmod -R 755 "$APP_DIR"
            
            # 2. Write .env file
            cat > "$APP_DIR/.env" << 'INNER_EOF'
            ${{ secrets.LARAVEL_ENV_FILE }}
            INNER_EOF
            chmod 600 "$APP_DIR/.env"
            
            # 3. Set storage/cache permissions
            chmod -R 775 "$APP_DIR/storage" "$APP_DIR/bootstrap/cache"
            
            # 4. Laravel Build & Cache
            cd "$APP_DIR"
            export PATH=/usr/local/bin:/usr/bin:/bin
            
            echo "[INFO] Running composer and artisan commands..."
            # Check if composer exists, if not use local or global
            COMPOSER_BIN=$(which composer || echo "php /usr/local/bin/composer")
            $COMPOSER_BIN install --no-dev --optimize-autoloader
            
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:clear
            php artisan view:cache
            
            # 5. Public Entrypoint Setup (index.php)
            echo "[INFO] Setting up public entrypoints..."
            # Adjust index.php paths based on whether APP_DIR is BASE_DIR
            if [ "$APP_DIR" == "$BASE_DIR" ]; then
                LOADER="./vendor/autoload.php"
                BOOTSTRAP="./bootstrap/app.php"
                MAINTENANCE="./storage/framework/maintenance.php"
            else
                LOADER="./laravel/vendor/autoload.php"
                BOOTSTRAP="./laravel/bootstrap/app.php"
                MAINTENANCE="./laravel/storage/framework/maintenance.php"
            fi

            cat > "$BASE_DIR/index.php" << EOF
            <?php
            define('LARAVEL_START', microtime(true));
            if (file_exists(\$maintenance = __DIR__ . '$MAINTENANCE')) {
                require \$maintenance;
            }
            require __DIR__ . '$LOADER';
            \$app = require_once __DIR__ . '$BOOTSTRAP';
            \$kernel = \$app->make(Illuminate\Contracts\Http\Kernel::class);
            \$response = \$kernel->handle(\$request = Illuminate\Http\Request::capture())->send();
            \$kernel->terminate(\$request, \$response);
            EOF

            # 6. Setup .htaccess
            if [ -f "$APP_DIR/public/.htaccess" ]; then
              cp -f "$APP_DIR/public/.htaccess" "$BASE_DIR/.htaccess"
              sed -i '1i DirectoryIndex index.php' "$BASE_DIR/.htaccess"
            else
              printf "DirectoryIndex index.php\n<IfModule mod_rewrite.c>\n    RewriteEngine On\n    RewriteCond %%{REQUEST_FILENAME} !-d\n    RewriteCond %%{REQUEST_FILENAME} !-f\n    RewriteRule ^ index.php [L]\n</IfModule>" > "$BASE_DIR/.htaccess"
            fi
            
            # 7. Storage Symlink
            echo "[INFO] Verifying storage symlink..."
            [ -L "$BASE_DIR/storage" ] || ln -s "$APP_DIR/storage/app/public" "$BASE_DIR/storage"
            
            echo "[OK] Deployment tasks completed successfully"

