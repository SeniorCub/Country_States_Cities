name: Deploy Laravel API

on:
  push:
    branches:
      - main
    paths:
      - 'Laravel/**'
      - '.github/workflows/deploy-laravel.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via FTP to Go54 cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./Laravel/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            storage/*.key
            .env
            .env.production

      - name: Server Configuration and Laravel Setup
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail
            BASE_DIR=~/public_html/country-states-cities.seniorcub.name.ng
            APP_DIR="$BASE_DIR/laravel"
            
            echo "[INFO] Starting server-side setup..."
            
            # 1. Ensure directory exists and set permissions
            mkdir -p "$APP_DIR"
            chmod -R 755 "$APP_DIR"
            
            # 2. Write .env file
            cat > "$APP_DIR/.env" << 'INNER_EOF'
            ${{ secrets.LARAVEL_ENV_FILE }}
            INNER_EOF
            chmod 600 "$APP_DIR/.env"
            
            # 3. Validate artisan exists
            if [ ! -f "$APP_DIR/artisan" ]; then
              echo "[ERROR] artisan not found at $APP_DIR/artisan"
              exit 1
            fi
            
            # 4. Set storage/cache permissions
            chmod -R 775 "$APP_DIR/storage" "$APP_DIR/bootstrap/cache"
            
            # 5. Laravel Build & Cache
            cd "$APP_DIR"
            export PATH=/usr/local/bin:/usr/bin:/bin
            
            echo "[INFO] Running composer and artisan commands..."
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:clear
            php artisan view:cache
            
            # 6. Public Entrypoint Setup
            echo "[INFO] Setting up public entrypoints..."
            printf '<?php\n\nuse Illuminate\\Contracts\\Http\\Kernel;\nuse Illuminate\\Http\\Request;\n\ndefine('\''LARAVEL_START'\'', microtime(true));\n\nif (file_exists($maintenance = __DIR__."/laravel/storage/framework/maintenance.php")) {\n    require $maintenance;\n}\n\nrequire __DIR__."/laravel/vendor/autoload.php";\n\n$app = require_once __DIR__."/laravel/bootstrap/app.php";\n\n$kernel = $app->make(Kernel::class);\n\n$response = $kernel->handle(\n    $request = Request::capture()\n)->send();\n\n$kernel->terminate($request, $response);' > "$BASE_DIR/index.php"

            if [ -f "$APP_DIR/public/.htaccess" ]; then
              cp -f "$APP_DIR/public/.htaccess" "$BASE_DIR/.htaccess"
              sed -i '1i DirectoryIndex index.php' "$BASE_DIR/.htaccess"
            else
              printf "DirectoryIndex index.php\n<IfModule mod_rewrite.c>\n    RewriteEngine On\n    RewriteCond %%{REQUEST_FILENAME} !-d\n    RewriteCond %%{REQUEST_FILENAME} !-f\n    RewriteRule ^ index.php [L]\n</IfModule>" > "$BASE_DIR/.htaccess"
            fi
            
            # 7. Storage Symlink
            echo "[INFO] Verifying storage symlink..."
            [ -L "$BASE_DIR/storage" ] || ln -s "$APP_DIR/storage/app/public" "$BASE_DIR/storage"
            
            echo "[OK] Deployment tasks completed successfully"

